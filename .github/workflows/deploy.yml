name: Build and Deploy to K8s

# 1. 触发条件：当代码推送到 main 分支时运行
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # 加上这一行就能手动触发

# 2. 工作流程
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 第一步：把代码拉到 GitHub 的虚拟服务器上
    - name: Checkout code
      uses: actions/checkout@v3

    # 第二步：登录到你的容器镜像仓库
    - name: Log in to Docker Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.REGISTRY_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    # 第三步：构建 Docker 镜像，并推送到仓库
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.v5      #指定用Dockerfile.v5构建
        push: true
        # 镜像标签：仓库地址/镜像名:时间戳-代码提交ID，保证每次镜像都是唯一的
        tags: ${{ secrets.REGISTRY_SERVER }}/cpuhyong/openclaw-k8s:${{ github.sha }}

    # 第四步：配置 kubectl，让它能连接你的 K8s 集群
    - name: Set up kubectl
      run: |
        # 创建 .kube 目录
        mkdir -p $HOME/.kube
        # 从 GitHub Secrets 中获取证书，并解码（之前存的是 base64 编码的）
        echo "${{ secrets.K8S_CA_CRT }}" | base64 --decode > $HOME/.kube/ca.crt
        # 配置 kubectl 使用证书和 Token 进行连接
        kubectl config set-cluster k8s-cluster --server=${{ secrets.K8S_SERVER }} --certificate-authority=$HOME/.kube/ca.crt --embed-certs=true
        kubectl config set-credentials cicd-sa --token=${{ secrets.K8S_TOKEN }}
        kubectl config set-context k8s-context --cluster=k8s-cluster --user=cicd-sa --namespace=cicd
        kubectl config use-context k8s-context

    # 第五步：部署应用到 K8s
    - name: Deploy to Kubernetes
      run: |
        # 这里使用 kubectl set image 命令来更新 Deployment 的镜像
        # 假设你的 Deployment 名字叫 my-app-deployment，容器名字叫 my-app-container
        kubectl set image deployment/openclaw-gateway gateway=${{ secrets.REGISTRY_SERVER }}/cpuhyong/openclaw-k8s:${{ github.sha }} -n openclaw
        # 你也可以用 kubectl apply -f 你的部署文件.yaml 的方式，但需要提前在仓库里有这个文件
        # kubectl apply -f k8s-deployment.yaml

