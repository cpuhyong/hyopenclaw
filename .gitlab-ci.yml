stages:
  - build-push
  - update-manifest

variables:
  # 内部镜像仓库地址（HTTP，无认证）
  REGISTRY: docker-registry.dockerregistry.svc.cluster.local:5000
  IMAGE_NAME: cpuhyong/openclaw
  IMAGE_TAG: $CI_PIPELINE_IID
  FULL_IMAGE: $REGISTRY/$IMAGE_NAME:$IMAGE_TAG

  # Kaniko 缓存配置（可选）
  KANIKO_CACHE: "true"
  KANIKO_CACHE_DIR: /kaniko/cache

build-push:
  stage: build-push
  image:
    name: gcr.io/kaniko-project/executor:latest
    entrypoint: [""]
  tags:
    - k8s
  script:
    # 创建空的 Docker 认证文件（因为 registry 无需认证）
    - mkdir -p /kaniko/.docker
    - echo '{"auths":{}}' > /kaniko/.docker/config.json
    # 执行 Kaniko 构建并推送
    - /kaniko/executor
      --context=${CI_PROJECT_DIR}
      --dockerfile=${CI_PROJECT_DIR}/Dockerfile
      --destination=${FULL_IMAGE}
      --cache=${KANIKO_CACHE}
      --cache-dir=${KANIKO_CACHE_DIR}
      --snapshot-mode=redo
      --push-retry=3
      --insecure                      # 必须！因为内部 registry 是 HTTP
      # --skip-tls-verify              # 如果使用自签名 HTTPS 证书则加上
    # 将完整的镜像名写入产物文件，供下一阶段使用
    - echo ${FULL_IMAGE} > image.txt
  artifacts:
    paths:
      - image.txt
    expire_in: 1 week
  only:
    - main # 只有在 main 分支推送时才触发

update-manifest:
  stage: update-manifest
  image: alpine/git:latest
  tags:
    - k8s
  before_script:
    - apk add --no-cache sed
  script:
    # 使用 CI_JOB_TOKEN 克隆部署清单仓库（需提前授权）
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.cpuhy.abrdns.com/cpuhyong/rnd/openclaw-manifests.git
    - cd openclaw-manifests
    # 读取上一阶段生成的镜像名
    - NEW_IMAGE=$(cat ../image.txt)
    # 更新 deployment.yaml 中的镜像地址（假设文件在根目录）
    # - sed -i "s|image:.*|image: $NEW_IMAGE|g" deployment.yaml
    - >-
      sed -i 
      "s|image:.*|image: ${NEW_IMAGE}|g" 
      deployment.yaml
    # 提交并推送更改
    - git config user.email "ci-bot@example.com"
    - git config user.name "CI Bot"
    - git add deployment.yaml
    - git commit -m "Update image to $NEW_IMAGE [skip ci]"
    - git push https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.cpuhy.abrdns.com/cpuhyong/rnd/openclaw-manifests.git HEAD:main
  only:
    - main # 只有在 main 分支推送时才触发
  needs:
    - build-push # 确保镜像构建成功后才更新 manifest，，这个指的就是第一个过程的名称
